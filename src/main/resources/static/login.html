<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Inicia sesión en tu cuenta de LexGuard para acceder a consultas legales profesionales.">
    <title>Iniciar Sesión | LexGuard</title>
    <link rel="stylesheet" href="css/style.css">
    <style>
        .login-visual {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 600px;
            height: 600px;
            border-radius: 50%;
            background: radial-gradient(circle, rgba(201, 162, 39, 0.04) 0%, transparent 70%);
            pointer-events: none;
            animation: breathe 6s ease-in-out infinite;
        }
        @keyframes breathe {
            0%, 100% { transform: translate(-50%, -50%) scale(1); opacity: 0.5; }
            50% { transform: translate(-50%, -50%) scale(1.15); opacity: 1; }
        }
        .divider-line {
            display: flex;
            align-items: center;
            gap: 1rem;
            margin: 1.5rem 0;
            color: var(--text-muted);
            font-size: 0.8rem;
        }
        .divider-line::before,
        .divider-line::after {
            content: '';
            flex: 1;
            height: 1px;
            background: var(--glass-border);
        }
    </style>
</head>
<body>

    <nav class="navbar">
        <a href="index.html" class="logo">LEX<span>GUARD</span></a>
        <div class="auth-buttons">
            <a href="registro.html" class="btn btn-outline">Crear Cuenta</a>
        </div>
    </nav>

    <div class="auth-container">
        <div class="login-visual"></div>
        <div class="glass-card">
            <h2>Bienvenido</h2>
            <p>Ingresa tus credenciales para continuar</p>

            <div id="alertMessage" class="alert"></div>

            <form id="loginForm">
                <div class="form-group">
                    <label for="email">Correo Electrónico</label>
                    <input type="email" id="email" required placeholder="correo@ejemplo.com" autocomplete="email">
                </div>
                <div class="form-group">
                    <label for="password">Contraseña</label>
                    <input type="password" id="password" required placeholder="••••••••" autocomplete="current-password">
                </div>

                <button type="submit" class="btn-block" id="btnSubmit">
                    INGRESAR
                </button>
            </form>

            <div class="divider-line">o</div>

            <div class="auth-links">
                ¿No tienes cuenta? <a href="registro.html">Regístrate gratis</a>
            </div>
        </div>
    </div>

    <script src="js/auth.js"></script>
    <script>
        auth.redirectIfAuthenticated();
    </script>
    <script>
        const API_URL = 'http://localhost:8080/api';

        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const btn = document.getElementById('btnSubmit');
            const errorAlert = document.getElementById('alertMessage');

            btn.innerHTML = '<span class="spinner"></span> Conectando...';
            btn.disabled = true;
            errorAlert.style.display = 'none';

            const payload = {
                email: document.getElementById('email').value,
                password: document.getElementById('password').value
            };

            try {
                const response = await fetch(`${API_URL}/auth/login`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                });

                const data = await response.json();

                if (response.ok) {
                    auth.setSession(data);
                    window.location.href = 'dashboard.html';
                } else {
                    let errText = "Credenciales inválidas";
                    if (data.mensaje && typeof data.mensaje === 'string') {
                        errText = data.mensaje;
                    } else if (data.error && typeof data.error === 'string') {
                        errText = data.error;
                    } else if (data.detalles) {
                        errText = "Validación fallida. Revisa los campos ingresados.";
                    }
                    errorAlert.innerText = errText;
                    errorAlert.className = 'alert alert-danger';
                    errorAlert.style.display = 'block';
                }
            } catch (err) {
                errorAlert.innerText = "Error de conexión con el servidor. Verifica que el backend esté activo.";
                errorAlert.className = 'alert alert-danger';
                errorAlert.style.display = 'block';
            } finally {
                btn.innerHTML = 'INGRESAR';
                btn.disabled = false;
            }
        });
    </script>
</body>
</html>
