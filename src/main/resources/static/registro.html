<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Crea tu cuenta gratuita en LexGuard y accede a asistencia legal profesional.">
    <title>Crear Cuenta | LexGuard</title>
    <link rel="stylesheet" href="css/style.css">
    <style>
        .register-visual {
            position: absolute;
            top: 40%;
            right: 20%;
            width: 500px;
            height: 500px;
            border-radius: 50%;
            background: radial-gradient(circle, rgba(59, 130, 246, 0.04) 0%, transparent 70%);
            pointer-events: none;
            animation: float 8s ease-in-out infinite;
        }

        @keyframes float {

            0%,
            100% {
                transform: translateY(0);
            }

            50% {
                transform: translateY(-20px);
            }
        }

        .steps-indicator {
            display: flex;
            justify-content: center;
            gap: 0.5rem;
            margin-bottom: 2rem;
        }

        .step-dot {
            width: 40px;
            height: 4px;
            border-radius: 2px;
            background: var(--glass-border);
            transition: var(--transition);
        }

        .step-dot.active {
            background: var(--accent);
            width: 60px;
        }

        .role-selector {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 0.75rem;
            margin-bottom: 0.5rem;
        }

        .role-option {
            padding: 1rem;
            border: 1.5px solid var(--glass-border);
            border-radius: var(--radius-md);
            cursor: pointer;
            text-align: center;
            transition: var(--transition);
            background: var(--bg-input);
        }

        .role-option:hover {
            border-color: rgba(201, 162, 39, 0.3);
        }

        .role-option.selected {
            border-color: var(--accent);
            background: rgba(201, 162, 39, 0.08);
        }

        .role-option .role-icon {
            font-size: 1.5rem;
            margin-bottom: 0.4rem;
        }

        .role-option .role-title {
            font-weight: 600;
            font-size: 0.9rem;
            color: var(--text-primary);
            margin-bottom: 0.2rem;
        }

        .role-option .role-desc {
            font-size: 0.75rem;
            color: var(--text-secondary);
        }

        .field-error {
            color: #fca5a5;
            font-size: 0.8rem;
            margin-top: 0.3rem;
            display: none;
        }

        #especialidadGroup {
            display: none;
            margin-bottom: 1.25rem;
        }

        #especialidadGroup.show {
            display: block;
        }
    </style>
</head>

<body>

    <nav class="navbar">
        <a href="index.html" class="logo">LEX<span>GUARD</span></a>
        <div class="auth-buttons">
            <a href="login.html" class="btn btn-outline">Iniciar Sesión</a>
        </div>
    </nav>

    <div class="auth-container">
        <div class="register-visual"></div>
        <div class="glass-card" style="max-width: 480px;">
            <h2>Crear Cuenta</h2>
            <p>Únete a la plataforma de asistencia legal gratuita</p>

            <div class="steps-indicator">
                <div class="step-dot active"></div>
                <div class="step-dot"></div>
                <div class="step-dot"></div>
            </div>

            <div id="alertMessage" class="alert"></div>

            <form id="registerForm">
                <div class="form-group">
                    <label for="nombreCompleto">Nombre Completo</label>
                    <input type="text" id="nombreCompleto" required placeholder="Ej. Juan Pérez García"
                        autocomplete="name">
                    <div class="field-error" id="err-nombre"></div>
                </div>

                <div class="form-group">
                    <label for="email">Correo Electrónico</label>
                    <input type="email" id="email" required placeholder="correo@ejemplo.com" autocomplete="email">
                    <div class="field-error" id="err-email"></div>
                </div>

                <div class="form-group">
                    <label for="password">Contraseña</label>
                    <input type="password" id="password" required placeholder="Mínimo 6 caracteres"
                        autocomplete="new-password">
                    <div class="field-error" id="err-password"></div>
                </div>

                <div class="form-group">
                    <label>Tipo de Cuenta</label>
                    <div class="role-selector">
                        <div class="role-option selected" data-role="CLIENTE">
                            <div class="role-icon">👤</div>
                            <div class="role-title">Cliente</div>
                            <div class="role-desc">Busco ayuda legal</div>
                        </div>
                        <div class="role-option" data-role="ABOGADO">
                            <div class="role-icon">⚖️</div>
                            <div class="role-title">Abogado</div>
                            <div class="role-desc">Ofrezco servicios</div>
                        </div>
                    </div>
                    <input type="hidden" id="rol" value="CLIENTE">
                </div>

                <div class="form-group" id="especialidadGroup">
                    <label for="especialidad">Área de Especialidad</label>
                    <select id="especialidad">
                        <option value="">Selecciona tu especialidad</option>
                        <option value="CIVIL">Derecho Civil</option>
                        <option value="LABORAL">Derecho Laboral</option>
                        <option value="PENAL">Derecho Penal</option>
                        <option value="FAMILIAR">Derecho Familiar</option>
                    </select>
                    <div class="field-error" id="err-especialidad"></div>
                </div>

                <button type="submit" class="btn-block" id="btnSubmit">
                    CREAR CUENTA Y CONTINUAR
                </button>
            </form>

            <div class="auth-links">
                ¿Ya tienes cuenta? <a href="login.html">Inicia Sesión</a>
            </div>
        </div>
    </div>

    <script src="js/auth.js"></script>
    <script>
        auth.redirectIfAuthenticated();

        // Asegurar que el DOM está listo
        document.addEventListener('DOMContentLoaded', function () {
            // --- Role Selector ---
            function selectRole(el) {
                const selectedRole = el.getAttribute('data-role');
                document.querySelectorAll('.role-option').forEach(opt => opt.classList.remove('selected'));
                el.classList.add('selected');
                document.getElementById('rol').value = selectedRole;

                // Mostrar/ocultar campo de especialidad
                const especialidadGroup = document.getElementById('especialidadGroup');
                const especialidadSelect = document.getElementById('especialidad');

                if (selectedRole === 'ABOGADO') {
                    especialidadGroup.classList.add('show');
                    especialidadSelect.required = true;
                } else {
                    especialidadGroup.classList.remove('show');
                    especialidadSelect.required = false;
                    especialidadSelect.value = '';
                }

                // Animate step indicator
                const dots = document.querySelectorAll('.step-dot');
                dots.forEach((d, i) => d.classList.toggle('active', i <= 2));
            }

            // Asignar la función a las opciones
            document.querySelectorAll('.role-option').forEach(option => {
                option.addEventListener('click', function () {
                    selectRole(this);
                });
            });

            // Animate steps as user fills form
            const fields = ['nombreCompleto', 'email', 'password'];
            fields.forEach((id, idx) => {
                const field = document.getElementById(id);
                if (field) {
                    field.addEventListener('input', (e) => {
                        const dots = document.querySelectorAll('.step-dot');
                        if (e.target.value.length > 0) {
                            dots[idx].classList.add('active');
                        }
                    });
                }
            });
        });
    </script>

    <script>
        const API_URL = 'http://localhost:8080/api';

        document.getElementById('registerForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const btn = document.getElementById('btnSubmit');
            const errorAlert = document.getElementById('alertMessage');

            // Clean previous validation UI
            document.querySelectorAll('.field-error').forEach(el => el.style.display = 'none');

            btn.innerHTML = '<span class="spinner"></span> Registrando...';
            btn.disabled = true;
            errorAlert.style.display = 'none';

            const payload = {
                nombreCompleto: document.getElementById('nombreCompleto').value,
                email: document.getElementById('email').value,
                password: document.getElementById('password').value,
                rol: document.getElementById('rol').value
            };

            // Agregar especialidad si es abogado
            if (payload.rol === 'ABOGADO') {
                const especialidad = document.getElementById('especialidad').value;
                if (!especialidad) {
                    const el = document.getElementById('err-especialidad');
                    el.innerText = 'Debes seleccionar una especialidad';
                    el.style.display = 'block';
                    btn.innerHTML = 'CREAR CUENTA Y CONTINUAR';
                    btn.disabled = false;
                    return;
                }
                payload.especialidad = especialidad;
            }

            try {
                const response = await fetch(`${API_URL}/auth/registro`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                });

                const data = await response.json();

                if (response.ok) {
                    auth.setSession(data);
                    window.location.href = 'dashboard.html';
                } else {
                    if (data.detalles) {
                        if (data.detalles.nombreCompleto) {
                            const el = document.getElementById('err-nombre');
                            el.innerText = data.detalles.nombreCompleto;
                            el.style.display = 'block';
                        }
                        if (data.detalles.email) {
                            const el = document.getElementById('err-email');
                            el.innerText = data.detalles.email;
                            el.style.display = 'block';
                        }
                        if (data.detalles.password) {
                            const el = document.getElementById('err-password');
                            el.innerText = data.detalles.password;
                            el.style.display = 'block';
                        }
                    } else if (data.mensaje) {
                        errorAlert.innerText = data.mensaje;
                        errorAlert.className = 'alert alert-danger';
                        errorAlert.style.display = 'block';
                    } else if (data.error) {
                        errorAlert.innerText = data.error;
                        errorAlert.className = 'alert alert-danger';
                        errorAlert.style.display = 'block';
                    }
                }
            } catch (err) {
                errorAlert.innerText = "Fallo de conexión. Verifica que el servidor backend esté activo.";
                errorAlert.className = 'alert alert-danger';
                errorAlert.style.display = 'block';
            } finally {
                btn.innerHTML = 'CREAR CUENTA Y CONTINUAR';
                btn.disabled = false;
            }
        });
    </script>
</body>

</html>
